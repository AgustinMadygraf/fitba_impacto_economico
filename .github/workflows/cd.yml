name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  verify-secrets:
    runs-on: ubuntu-latest
    environment: app-production
    steps:
      - name: Check Secrets
        run: |
          echo "Checking required secrets in environment 'app-production'..."
          
          # Función para validar existencia de un secreto
          validate_secret() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then
              echo "::error::Secret '$name' is NOT configured in the 'app-production' environment."
              return 1
            else
              echo "Secret '$name' is configured."
              return 0
            fi
          }

          exit_code=0
          validate_secret "VPS_HOST" "${{ secrets.VPS_HOST }}" || exit_code=1
          validate_secret "VPS_USER" "${{ secrets.VPS_USER }}" || exit_code=1
          validate_secret "VPS_KEY"  "${{ secrets.VPS_KEY }}"  || exit_code=1
          
          if [ $exit_code -ne 0 ]; then
            echo "::error::Pipeline failed because one or more required secrets are missing."
            exit $exit_code
          fi
          
          echo "All required secrets are present."

  deploy:
    needs: verify-secrets
    runs-on: ubuntu-latest
    environment: vps-production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script_stop: true
          script: |
            echo "SSH connection established successfully."
            cd /ruta/a/tu/proyecto
            git pull origin main
            echo "Deployment completed successfully."
