name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: vps-production
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify key fingerprint
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          echo "Fingerprint del secreto en GitHub:"
          ssh-keygen -y -f ~/.ssh/vps_key | ssh-keygen -lf -
        env:
          VPS_KEY: ${{ secrets.VPS_KEY }}
        
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 5932
          debug: true
          script: |
            echo "SSH connection established successfully."
