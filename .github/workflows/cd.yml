name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  validate-env:
    runs-on: ubuntu-latest
    environment: vps-production
    steps:
      - name: Validate Secrets
        run: |
          echo "VPS_KEY length: ${#VPS_KEY}"
        env:
          VPS_KEY: ${{ secrets.VPS_KEY }}

  deploy:
    needs: validate-env
    runs-on: ubuntu-latest
    environment: vps-production
    steps:
      - uses: actions/checkout@v4
        
      - name: Debug and Deploy
        run: |
          echo "VPS_KEY length: ${#VPS_KEY}"
        env:
          VPS_KEY: ${{ secrets.VPS_KEY }}
          
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 5932
          debug: true
          script: |
            echo "SSH connection established successfully."
