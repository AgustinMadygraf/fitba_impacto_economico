name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  validate-env:
    runs-on: ubuntu-latest
    environment: vps-production
    steps:
      - name: Validate Secrets
        run: |
          echo "Validating environment vps-production..."
          if [ -z "${{ secrets.VPS_KEY }}" ]; then
            echo "::error::VPS_KEY secret is missing!"
            exit 1
          else
            echo "VPS_KEY secret is present (length: ${#VPS_KEY})."
          fi
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "::error::VPS_HOST secret is missing!"
            exit 1
          fi

  deploy:
    needs: validate-env
    runs-on: ubuntu-latest
    environment: vps-production
    steps:
      - uses: actions/checkout@v4
        
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 5932
          debug: true
          script: |
            echo "SSH connection established successfully."
            echo "Deployment completed successfully."
